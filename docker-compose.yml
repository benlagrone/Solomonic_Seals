version: "3.9"

services:
  solomonic-clock:
    build: .
    image: solomonic-clock:latest
    container_name: solomonic-clock
    restart: unless-stopped
    environment:
      - PORT=8080
      - SOLOMONIC_PSALM_SOURCE_MODE=pericope_first
      - SOLOMONIC_PERICOPE_API_BASE=http://host.docker.internal:8001
      - SOLOMONIC_GUIDED_PROMPTS_API_KEY=${SOLOMONIC_GUIDED_PROMPTS_API_KEY:-}
      - SOLOMONIC_HISTORY_STORE_PATH=${SOLOMONIC_HISTORY_STORE_PATH:-/var/lib/solomonic-clock/history_store.json}
      - SOLOMONIC_AUTH_URL=${SOLOMONIC_AUTH_URL:-https://auth.pericopeai.com}
      - SOLOMONIC_AUTH_REALM=${SOLOMONIC_AUTH_REALM:-pericope}
      - SOLOMONIC_AUTH_CLIENT_ID=${SOLOMONIC_AUTH_CLIENT_ID:-pericope-web}
      - SOLOMONIC_AUTH_DISABLED=${SOLOMONIC_AUTH_DISABLED:-false}
      - SOLOMONIC_DEV_FAKE_AUTH=${SOLOMONIC_DEV_FAKE_AUTH:-false}
      - SOLOMONIC_DEV_FAKE_AUTH_DEFAULT_SUB=${SOLOMONIC_DEV_FAKE_AUTH_DEFAULT_SUB:-clock-dev-user}
      - SOLOMONIC_DEV_FAKE_AUTH_DEFAULT_NAME=${SOLOMONIC_DEV_FAKE_AUTH_DEFAULT_NAME:-Local Clock User}
    ports:
      - "${SOLOMONIC_HOST_PORT:-8086}:8080"
    volumes:
      - solomonic-clock-history:/var/lib/solomonic-clock
    networks:
      - fortress-phronesis-net

networks:
  fortress-phronesis-net:
    external: true

volumes:
  solomonic-clock-history:
